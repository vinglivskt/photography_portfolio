name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync project to server
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude ".venv" \
            --exclude "node_modules" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/

      # Heredoc с <<'ENVEOF' — иначе bash на runner съедает $$ в htpasswd и $ в паролях
      - name: Write production env file
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p ${{ secrets.SERVER_PATH }}"
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cat > ${{ secrets.SERVER_PATH }}/.env" <<'ENVEOF'
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          UPLOAD_DIR=${{ secrets.UPLOAD_DIR }}
          LEGACY_MEDIA_IMPORT_DIR=${{ secrets.LEGACY_MEDIA_IMPORT_DIR }}
          STATIC_SEED_IMAGES_DIR=${{ secrets.STATIC_SEED_IMAGES_DIR }}
          FORCE_LEGACY_MEDIA_REIMPORT=${{ secrets.FORCE_LEGACY_MEDIA_REIMPORT }}
          LEGACY_MEDIA_BIND=${{ secrets.LEGACY_MEDIA_BIND }}
          THEME_STATIC_BIND=${{ secrets.THEME_STATIC_BIND }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS=${{ secrets.SMTP_USE_TLS }}
          FEEDBACK_FROM_EMAIL=${{ secrets.FEEDBACK_FROM_EMAIL }}
          FEEDBACK_TO_EMAIL=${{ secrets.FEEDBACK_TO_EMAIL }}
          TRAEFIK_DOMAIN=${{ secrets.TRAEFIK_DOMAIN }}
          ACME_EMAIL=${{ secrets.ACME_EMAIL }}
          ADMINER_BASIC_AUTH_USERS=${{ secrets.ADMINER_BASIC_AUTH_USERS }}
          ADMINER_PORT=${{ secrets.ADMINER_PORT }}
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
          ADMINER_HOST=${{ secrets.ADMINER_HOST }}
          ENVEOF

      - name: Deploy with Docker Compose
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e
            cd ${{ secrets.SERVER_PATH }}
            export COMPOSE_FILE=docker-compose.yml:docker-compose.traefik.yml
            docker compose config --quiet
            docker compose pull --ignore-pull-failures || true
            if ! docker compose up -d --build; then
              docker compose ps
              docker compose logs --no-color --tail=200 db api nginx traefik adminer || true
              exit 1
            fi
            docker compose ps
            docker image prune -f
          "

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portfolio_test
          POSTGRES_PASSWORD: portfolio_test
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U portfolio_test -d portfolio_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync deps
        run: uv sync --frozen --all-groups
      - name: Pytest
        env:
          PYTEST_DATABASE_URL: postgresql+asyncpg://portfolio_test:portfolio_test@127.0.0.1:5432/portfolio_test
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Tests
        run: npm test

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        env:
          ACME_EMAIL: ci@example.test
          TRAEFIK_DOMAIN: localhost
          ADMINER_FQDN: adminer.localhost
          # Тестовая строка htpasswd (пароль «test»), только для валидации compose
          ADMINER_BASIC_AUTH_USERS: 'test:$apr1$H6uskkkW$IgXLP6ewTrSuBkTrqE8wj/'
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.http.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.traefik.yml config --quiet

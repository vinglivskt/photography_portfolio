services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    networks:
      - app-network
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:?укажите ACME_EMAIL в .env}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --api.dashboard=false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt

  nginx:
    labels:
      - traefik.enable=true
      - traefik.http.services.portfolio.loadbalancer.server.port=80
      - traefik.http.routers.portfolio-http.rule=Host(`${TRAEFIK_DOMAIN}`)
      - traefik.http.routers.portfolio-http.entrypoints=web
      - traefik.http.routers.portfolio-http.middlewares=portfolio-redirect-https
      - traefik.http.middlewares.portfolio-redirect-https.redirectscheme.scheme=https
      - traefik.http.middlewares.portfolio-redirect-https.redirectscheme.permanent=true
      - traefik.http.routers.portfolio.rule=Host(`${TRAEFIK_DOMAIN}`)
      - traefik.http.routers.portfolio.entrypoints=websecure
      - traefik.http.routers.portfolio.tls=true
      - traefik.http.routers.portfolio.tls.certresolver=le

  adminer:
    labels:
      - traefik.enable=true
      - traefik.http.services.adminer.loadbalancer.server.port=8080
      - traefik.http.middlewares.adminer-auth.basicauth.users=${ADMINER_BASIC_AUTH_USERS:?задайте ADMINER_BASIC_AUTH_USERS в .env (см. env.example)}
      # Поддомен adminer.<TRAEFIK_DOMAIN> — совпадает с A-записью adminer.* в DNS
      - traefik.http.routers.adminer.rule=Host(\`adminer.${TRAEFIK_DOMAIN}\`)
      - traefik.http.routers.adminer.entrypoints=websecure
      - traefik.http.routers.adminer.tls=true
      - traefik.http.routers.adminer.tls.certresolver=le
      - traefik.http.routers.adminer.middlewares=adminer-auth
      - traefik.http.routers.adminer-http.rule=Host(\`adminer.${TRAEFIK_DOMAIN}\`)
      - traefik.http.routers.adminer-http.entrypoints=web
      - traefik.http.routers.adminer-http.middlewares=adminer-redirect-https
      - traefik.http.middlewares.adminer-redirect-https.redirectscheme.scheme=https
      - traefik.http.middlewares.adminer-redirect-https.redirectscheme.permanent=true

volumes:
  traefik_letsencrypt:
